              - text: Are these real physical cards?
              - img [ref=e268]
            - paragraph [ref=e272]: Yes. Every card on Phygitals is a real, professionally graded physical card stored in secure vault facilities. When you open a pack, you receive ownership of a specific physical slab that exists in a PSA, Fanatics, or Alt vault. You can ship it to your door at any time.
          - generic [ref=e273]:
            - button "How does shipping work?" [ref=e274]:
              - text: How does shipping work?
              - img [ref=e275]
            - paragraph [ref=e277]: When you request a shipment, your card is pulled from the vault, carefully packaged, and shipped via fully tracked and insured delivery. We ship worldwide, and most domestic orders arrive within 5-7 business days. International shipping typically takes 10-14 days.
          - generic [ref=e278]:
            - button "What if I don't like my pull?" [ref=e279]:
              - text: What if I don't like my pull?
              - img [ref=e280]
            - paragraph [ref=e282]: You can sell any card back instantly for 85-90% of its market value, or list it on the marketplace at your own price. Many collectors also trade cards with each other directly on the platform.
          - generic [ref=e283]:
            - button "How are pulls determined? Is it fair?" [ref=e284]:
              - text: How are pulls determined? Is it fair?
              - img [ref=e285]
            - paragraph [ref=e287]: Every pull is determined by a provably fair system using public VRF (Verifiable Random Function). The odds for each pack are published transparently, and every result can be independently verified on-chain. No one, including us, can influence the outcome.
          - generic [ref=e288]:
            - button "Where are my cards stored?" [ref=e289]:
              - text: Where are my cards stored?
              - img [ref=e290]
            - paragraph [ref=e292]: Cards are stored in climate-controlled, fully insured vault facilities operated by PSA, Fanatics, and Alt. These are the same facilities used by major auction houses and institutional collectors. Your cards are protected around the clock.
          - generic [ref=e293]:
            - button "Can I sell my cards?" [ref=e294]:
              - text: Can I sell my cards?
              - img [ref=e295]
            - paragraph [ref=e297]: Absolutely. You can list any card on the Phygitals marketplace and set your own price. When it sells, funds are available immediately. You can also use the instant sell-back feature for a guaranteed payout at 85-90% of market value.
